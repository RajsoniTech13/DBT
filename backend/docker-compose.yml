version: '3.8'

services:
  # ─── Node.js Backend ────────────────────────────────────────────────────
  backend:
    build: .
    container_name: dbt_backend
    ports:
      - "5050:5000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - leakage-detection
    restart: on-failure
    networks:
      - dbt_network

  # ─── Real Leakage Detection Microservice ────────────────────────────────
  leakage-detection:
    build:
      context: ../Microservice/leakage_detection
      dockerfile: Dockerfile
    container_name: dbt_leakage_detection
    env_file:
      - ../Microservice/leakage_detection/.env
    depends_on:
      - redis
    ports:
      - "8000:8000"
    restart: on-failure
    networks:
      - dbt_network

  # ─── PostgreSQL Database ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dbt_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dbthackathon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dbt_network

  # ─── Redis Cache ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dbt_redis
    ports:
      - "6379:6379"
    networks:
      - dbt_network

  # ─── Hadoop Namenode ────────────────────────────────────────────────────
  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: dbt_hadoop_namenode
    environment:
      CLUSTER_NAME: dbt-cluster
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_webhdfs_enabled: "true"
      HDFS_CONF_dfs_permissions_enabled: "false"
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    networks:
      - dbt_network

  # ─── Hadoop Datanode (required for actual HDFS read/write) ──────────────
  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: dbt_hadoop_datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:9000
      CORE_CONF_hadoop_http_staticuser_user: root
      HDFS_CONF_dfs_webhdfs_enabled: "true"
      HDFS_CONF_dfs_permissions_enabled: "false"
    depends_on:
      - hadoop-namenode
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    networks:
      - dbt_network

volumes:
  pgdata:
  hadoop_namenode:
  hadoop_datanode:

networks:
  dbt_network:
    driver: bridge
